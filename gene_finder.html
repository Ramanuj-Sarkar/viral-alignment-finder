<!DOCTYPE html>
<html lang="en">

<head>
	<title>Ramanuj Sarkar Final Project</title>

	<!--[if IE]>
	<script src="http://html5shiv.googlecode.com/svn/trunk/html5.js"></script>
	<![endif]-->

	<link rel="stylesheet" type="text/css" href="css/project.css" />

	<script type="text/javascript" src="https://ajax.googleapis.com/ajax/libs/jquery/1.6.2/jquery.min.js"></script>

	<script type="text/javascript" src="js/project.js"></script>

</head>

<body>

<h1>Human Coronavirus Gene Finder</h1>


<h2>Available Genes</h2>
<form name="gene_choice" id="gene_choice" action="">

	<div>
	<input type="checkbox" id="sequence0" name="sequence0" value="on"><label for="sequence0">Human coronavirus OC43</label>
	</div>
	<div>
	<input type="checkbox" id="sequence1" name="sequence1" value="on"><label for="sequence1">Human coronavirus HKU1</label>
	</div>
	<div>
	<input type="checkbox" id="sequence2" name="sequence2" value="on"><label for="sequence2">Human coronavirus 229E</label>
	</div>
	<div>
	<input type="checkbox" id="sequence3" name="sequence3" value="on"><label for="sequence3">Severe acute respiratory syndrome coronavirus 2 (COVID-19)</label>
	</div>
	<div>
	<input type="checkbox" id="sequence4" name="sequence4" value="on"><label for="sequence4">Human betacoronavirus 2c</label>
	</div>
	<div>
	<input type="checkbox" id="sequence5" name="sequence5" value="on"><label for="sequence5">Human enteric coronavirus 4408</label>
	</div>
	<div>
	<input type="checkbox" id="sequence6" name="sequence6" value="on"><label for="sequence6">Sarbecovirus RhGB01</label>
	</div>
	<div>
	<input name="submit" type="submit" id="submit" value="submit">
	</div>

</form>

<section id='results'>
	
	<h2>Column Choices</h2>

<form name="column_choice" id="column_choice" action="">

	<p>
	<input type="checkbox" id="column0" name="column0" value="on" checked><label for="column0">Organism Name</label>
	</p>
	<p>
	<div>
	<input type="checkbox" id="column1" name="column1" value="on"><label for="column0">Gene Name</label>
	</div>
	<div>
	<input name="gene_search_term" id="gene_search_term" type="search" size="64" maxlength="64" value="" autofocus="autofocus" placeholder="Enter part of a gene name or the whole gene name.."/>
	<label for="gene_search_term">Gene Search Term</label>
	</div>
	</p>
	<p>
	<div>
	<input type="checkbox" id="column2" name="column2" value="on"><label for="column2">Product Name</label>
	</div>
	<div>
	<input type="checkbox" id="column3" name="column3" value="on"><label for="column1">Product Length</label>
	</div>
	<div>
	<input name="product_search_term" id="product_search_term" type="search" size="64" maxlength="64" value="" autofocus="autofocus" placeholder="Enter part of a product name or the entire product name."/>
	<label for="product_search_term">Product Search Term</label>
	</div>
	</p>

</form>	

	<p>
	<span id='match_count'>0</span> match(es) found.
	</p>

<table>

	<thead>
		<tr id="header">
		<!-- this will be filled in by javascript -->
		</tr>
	</thead>

	<tbody>
		<!-- this will be filled in by javascript when there are results -->
	</tbody>


</table>

</section>


</body>
</html>
