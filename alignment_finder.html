<body>

<h1>Human Coronavirus Alignment Finder</h1>

<form name="alignment_data" id="alignment_data" action="">

	<h2>First Product</h2>
	<div>
	<input type="radio" id="sequence0" name="first_radio" value="sequence0"><label for="sequence0">Human coronavirus OC43</label>
	</div>
	<div>
	<input type="radio" id="sequence1" name="first_radio" value="sequence1"><label for="sequence1">Human coronavirus HKU1</label>

	</div>
	<div>
	<input type="radio" id="sequence5" name="first_radio" value="sequence5"><label for="sequence5">Human enteric coronavirus 4408</label>

	<div>
	<input type="radio" id="sequence6" name="first_radio" value="sequence6"><label for="sequence6">Sarbecovirus RhGB01</label>
	</div>
	
	<p>
	<input name="first_product" id="first_product" size=50 maxlength=64 type="search" value="" autofocus="autofocus" placeholder="Enter the entire name of the product."/>
	<label for="first_product">First Product</label>
	</p>

	<h2>Second Product</h2>
	<div>
	<input type="radio" id="sequence0" name="second_radio" value="sequence0"><label for="sequence0">Human coronavirus OC43</label>
	</div>
	<div>
        <input type="radio" id="sequence1" name="second_radio" value="sequence1"><label for="sequence1">Human coronavirus HKU1</label>
	</div>
	<div>
	<input type="radio" id="sequence2" name="second_radio" value="sequence2"><label for="sequence2">Human coronavirus 229E</label>
	</div>
	<div>
	<input type="radio" id="sequence3" name="second_radio" value="sequence3"><label for="sequence3">Severe acute respiratory syndrome coronavirus 2 (COVID-19)</label>
	</div>
	<div>
	<input type="radio" id="sequence4" name="second_radio" value="sequence4"><label for="sequence4">Human betacoronavirus 2c</label>
	</div>
	<div>
	<input type="radio" id="sequence5" name="second_radio" value="sequence5"><label for="sequence5">Human enteric coronavirus 4408</label>
	</div>
	<div>

	</div>

	<p>
	<input name="second_product" id="second_product" size=50 maxlength=64 type="search" value="" autofocus="autofocus" placeholder="Enter the entire name of the product."/>
	<label for="second_product">Second Product</label>
	</p>
</form>

<input name="submit_alignment" type="submit" id="submit_alignment" value="submit">

<section id="alignment_results">
	<p>The number of alignments found was: <span id="alignment_count"> <!-- will be filled in by javascript --> </span></p>
	<p>The alignment score was: <span id="alignment_score"></span></p>
	<p>The matches, mismatches, and empty space in the top alignment sum up to: <span id="alignment"></span></p>
</section>
